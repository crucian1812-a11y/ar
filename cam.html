<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тест камеры</title>
<style>
  html,body{margin:0;height:100%;background:#111;color:#eee;font-family:Georgia,serif;}
  #v{width:100%;height:70vh;object-fit:cover;background:#000;display:block;}
  #b{display:block;width:90%;margin:16px auto;padding:16px;font-size:18px;border:none;border-radius:12px;
     background:#d9ad44;color:#111;font-weight:bold;}
  #log{padding:12px 16px;font-size:15px;line-height:1.5;white-space:pre-wrap;}
  .ok{color:#7ddc8a;} .err{color:#ff8a7a;}
</style>
</head>
<body>
  <video id="v" autoplay muted playsinline webkit-playsinline></video>
  <button id="b">Включить камеру (тест)</button>
  <div id="log">Это тест. Нажми кнопку выше.
Версия теста: t1</div>

<script>
  var log = document.getElementById('log');
  var v = document.getElementById('v');
  function add(msg, cls){
    var line = document.createElement('div');
    if(cls) line.className = cls;
    line.textContent = msg;
    log.appendChild(line);
  }
  window.addEventListener('error', function(e){ add('window error: ' + (e.message||e), 'err'); });

  document.getElementById('b').addEventListener('click', function(){
    add('Кнопка нажата. Запрашиваю камеру…');
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      add('Этот браузер НЕ поддерживает getUserMedia. Открой в обычном Chrome (не во встроенном браузере приложения).', 'err');
      return;
    }
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
      .then(function(stream){
        add('УСПЕХ: камера получена. Должно появиться изображение.', 'ok');
        v.srcObject = stream;
        var t = stream.getVideoTracks()[0];
        if(t) add('Камера: ' + t.label, 'ok');
      })
      .catch(function(err){
        add('ОШИБКА доступа: ' + err.name + ' — ' + err.message, 'err');
        if(err.name === 'NotAllowedError') add('→ Доступ запрещён. Разреши камеру для сайта и обнови.', 'err');
        if(err.name === 'NotReadableError') add('→ Камеру занял другой апп. Закрой камеру/рекордер/видеозвонки и обнови.', 'err');
        if(err.name === 'NotFoundError') add('→ Камера не найдена устройством.', 'err');
      });
  });
</script>
</body>
</html>
